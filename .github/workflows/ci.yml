name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint extension
        run: npm run lint

      - name: Build unsigned .xpi
        run: npm run build

      - name: Upload .xpi artifact
        uses: actions/upload-artifact@v5
        with:
          name: extension-unsigned
          path: dist/*.zip
          if-no-files-found: error
